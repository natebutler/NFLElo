name: Weekly Update NFL Elo Site

on:
  schedule:
   # - cron: "0 12 * * 2"
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install packages
        run: Rscript -e 'install.packages(c("nflfastR","dplyr","gt","nflreadr"))'

      - name: Run Elo script
        run: Rscript scripts/update_elo.R

      - name: Render Quarto
        run: quarto render

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
          with:
            render: false
            target: gh-pages
            
            
            